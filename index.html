<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ws forum</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <span class="auth-bg"></span>
    <div class="auth">
        <form method="get" class="form__auth shadow bord-rad">
            <input type="text" placeholder="ваш юз">
            <input type="password" placeholder="ваш пароль">
            <input type="submit" value="Отправить" class="submit-btn" id="auth-btn">
        </form>
    </div>
    <div class="container shadow bord-rad">
        
        <div class="sub-container">
            <h1 class="header-h1">W.S. Forum</h1>
            <div class="anon-form">
                <form method="post" id="user-form">
                    <input type="text" name="nickname" id="nickname" class="bord-rad shadow" placeholder="ваш юз">
                    <textarea name="input-txt" id="input-txt" class="bord-rad shadow" cols="30" rows="10" placeholder="Введите ваше сообщение" style="resize: none;"></textarea>
                    <button type="submit" id="submit-btn" class="bord-rad shadow">Отправить</button>
                </form>
            </div>
        </div>
        <div class="main-pub-block" id="main-pub-block">
            <!-- Как должен выглядеть элемент, добавляемый из JS -->
            <!-- <div class="main-pub-block-item shadow">
                <h1>Никнейм</h1>
                <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Tempore dolorum vero ex quaerat suscipit aliquid illo magnam hic explicabo ad, at deleniti architecto quas ducimus consequuntur. Voluptatum obcaecati repudiandae reprehenderit.</p>
            </div> -->
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
